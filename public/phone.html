<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>XLAB REALITY — hunt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />

    <!-- 8th Wall engine binary (SLAM / 6-DoF world tracking) + helpers, from CDN (free, no login). -->
    <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>
    <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js" crossorigin="anonymous"></script>

    <style>
      :root { --cream:#efe7d3; --ink:#0a0807; --accent:#ff6a1f; }
      * { margin:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
      html,body { height:100%; background:#000; color:var(--cream); font-family:"Archivo",system-ui,sans-serif; overflow:hidden; touch-action:none; }
      /* 8th Wall draws the camera feed + 3D scene here (FullWindowCanvas sizes it) */
      #camerafeed { position:fixed; inset:0; width:100%; height:100%; }
      #fx { position:fixed; inset:0; width:100%; height:100%; z-index:2; pointer-events:none; } /* 2D reticle + laser */

      .hud { position:fixed; inset:0; z-index:3; display:flex; flex-direction:column; justify-content:space-between; padding:20px; pointer-events:none; }
      .top { display:flex; justify-content:space-between; align-items:center; }
      .logo { font-weight:900; letter-spacing:.04em; font-size:16px; text-shadow:0 2px 10px #000; } .logo b { color:var(--accent); }
      .st { font:500 10px/1 "JetBrains Mono",monospace; letter-spacing:.12em; color:var(--cream); text-shadow:0 1px 6px #000; display:flex; gap:7px; align-items:center; }
      .st i { width:8px; height:8px; border-radius:50%; background:#5a5345; } .st i.live { background:#54e08a; box-shadow:0 0 10px #54e08a; }

      .bottom { display:flex; flex-direction:column; gap:12px; align-items:center; pointer-events:auto; }
      .prompt { font:700 12px/1.4 "JetBrains Mono",monospace; letter-spacing:.12em; color:var(--cream); text-shadow:0 1px 8px #000; text-align:center; min-height:16px; }
      .btn { width:100%; padding:22px; border:none; border-radius:18px; font-weight:900; font-size:17px; letter-spacing:.06em; }
      .release { background:var(--cream); color:var(--ink); box-shadow:0 0 40px rgba(239,231,211,.4); }
      .fire { background:var(--accent); color:#1a0a00; box-shadow:0 0 50px rgba(255,106,31,.6); }
      .fire.held { background:#fff; box-shadow:0 0 70px rgba(255,160,80,.9); }
      .hidden { display:none !important; }

      #dbg { position:fixed; top:54px; left:14px; right:14px; z-index:900; font:500 9px/1.5 "JetBrains Mono",monospace; color:#7fd0ff; text-shadow:0 1px 4px #000; white-space:pre-wrap; pointer-events:none; opacity:.92; }
      /* no 8th Wall branding — hide logo / powered-by / watermark on loading + landing (keeps the permission UI). JS observer in phone.js also strips it as it's injected. */
      [class*="-logo-section" i], [class*="poweredby" i], [class*="powered-by" i], [class*="watermark" i],
      a[href*="8thwall" i], img[src*="8thwall" i], img[alt*="8th wall" i] { display:none !important; }
    </style>
  </head>
  <body>
    <canvas id="camerafeed"></canvas>
    <canvas id="fx"></canvas>

    <div class="hud">
      <div class="top">
        <span class="logo">XLAB <b>REALITY</b></span>
        <span class="st"><i id="dot"></i><span id="status">STARTING AR…</span></span>
      </div>
      <div class="bottom">
        <div class="prompt" id="prompt"></div>
        <button class="btn release" id="release">THROW</button>
        <button class="btn fire hidden" id="fire">HOLD TO SHOOT</button>
      </div>
    </div>

    <div id="dbg"></div>

    <script type="importmap">
      { "imports": {
        "three": "/vendor/three.module.js",
        "three/addons/": "/vendor/addons/"
      } }
    </script>
    <script type="module" src="/phone.js"></script>
  </body>
</html>
